{% extends "base.html" %}
{% block title %}비밀번호 변경 · gimpo365-inventory{% endblock %}
{% block content %}
<h1>비밀번호 변경</h1>
<div class="card form-card">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <button type="submit">변경</button>
      <a class="back-link" href="{% url 'inventory:dashboard' %}">취소 / 대시보드로</a>
    </div>
  </form>
</div>
{% endblock %}
